id: compliance-stamp-duty
description: Direct NSW stamp-duty question — routes Compliance only, must cite Revenue NSW and mention the standard transfer-duty bracket.
prompt: "What stamp duty applies to a $900k purchase in NSW?"
expected_agents:
  - compliance
# Drop the exact dollar figure ($35,029) -- different LLMs do the
# arithmetic slightly differently ($34,929 from Claude, $35,029 from
# gpt-4o). Drop "8%" for the same reason -- the foreign-purchaser
# surcharge isn't always covered if the model focuses on the headline
# duty. The two surviving facts are structural: the source citation +
# the first-home-buyer mention (always called out for $900k purchases).
expected_facts:
  - "Revenue NSW"
  - "first home"
anti_facts:
  - "Victoria"
tier3: true
