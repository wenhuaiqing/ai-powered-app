id: general-app-help
description: Platform-meta question routes the catch-all General agent — no specialist fits "how does this work?".
prompt: "How does this app work? What can you do for me?"
expected_agents:
  - general
# "Reapit" is the only word the model literally cannot omit -- the
# system prompt frames it as "the Reapit One Platform" and any
