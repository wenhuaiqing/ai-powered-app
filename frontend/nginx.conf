# Nginx config for the ai-powered-app frontend container.
#
# - Serves the Vite SPA bundle from /usr/share/nginx/html
# - Falls back to index.html for unknown paths so React Router 7 picks
#   up routes like /properties, /pipeline, /valuations, etc.
# - Proxies /api, /orb, /health to the backend (FastAPI on :8000)
# - Pass-through for SSE: HTTP/1.1, no buffering, long read timeout so
#   /orb/chat can stream for the 90-second graph budget without nginx
#   closing the connection mid-stream.

server {
    listen       80;
    server_name  _;

    # Server-level root so every location block (including the internal
    # redirect to /index.html from the SPA fallback) resolves files from
    # the same path.
    root /usr/share/nginx/html;
    index index.html;

    # Vite hashes filenames -> cache aggressively. index.html is the
    # mutation point -> never cache.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE proxy. The trailing slash on proxy_pass is intentional:
    # /api/... -> http://backend:8000/api/... (path preserved).
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # /orb/* is the SSE endpoint. Buffering OFF so events flush to the
    # browser as soon as the graph emits them; long timeout matches
    # END_TOTAL_TIMEOUT_SECONDS (90s) plus a buffer.
    location /orb/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 180s;
        add_header X-Accel-Buffering no;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }
}
